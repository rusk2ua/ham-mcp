AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Ham Radio MCP Server — serverless deployment

Parameters:
  S3BucketName:
    Type: String
    Description: Name of the existing S3 bucket containing your ham radio logs and documents (e.g. ham-mcp-demo-bucket)

Globals:
  Function:
    Runtime: python3.13
    Timeout: 29
    MemorySize: 256
    Environment:
      Variables:
        S3_BUCKET: !Ref S3BucketName

Resources:
  HamMcpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: server.handler
      CodeUri: .
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref S3BucketName
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

Outputs:
  McpEndpoint:
    Description: MCP server URL — use this in your client config with transport streamable-http
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/mcp"
  S3BucketName:
    Description: S3 bucket configured for this deployment
    Value: !Ref S3BucketName
