AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Ham Radio MCP Server — serverless deployment

Globals:
  Function:
    Runtime: python3.12
    Timeout: 29
    MemorySize: 256
    Environment:
      Variables:
        S3_BUCKET: !Ref DataBucket
        AWS_REGION: !Ref AWS::Region

Resources:
  HamMcpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: server.handler
      CodeUri: .
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucket
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ham-radio-data-${AWS::AccountId}"

Outputs:
  McpEndpoint:
    Description: MCP server URL — use this in your client config with transport sse
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  DataBucketName:
    Description: S3 bucket for logs and documents
    Value: !Ref DataBucket
